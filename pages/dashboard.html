<!doctype html>
<html lang="en" class="dark">
  <head>

    <!-- EXTERNAL LINKS  -->
     <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- FontAwesome 6.5.1 -->

  <body

    <main class="w-screen h-screen flex">

      <!-- SIDEBAR  -->
      <aside class="w-32 max-sm:w-20 max-sm:hidden justify-self-stretch top-3 left-3 bottom-3 fixed rounded-2xl shadow-2xl 
      border border-brand-dark-dark/30 dark:border-brand-white/30 flex items-center flex-col justify-between gap-9
      bg-brand-white/70 dark:bg-brand-dark/70">
        <div class="w-24 h-24 flex items-center justify-center border-b border-brand-dark-dark/30 dark:border-brand-white/30">
          <img src="../assets/images/logo/01.png" class="w-12 object-center" alt="">

        <ul class="w-full flex flex-col items-center justify-start gap-5 h-full">

            <a href="" class="w-full flex flex-col items-center justify-cetner">

            </a>
          </li>
          <li id="report" class="w-16 h-16 flex items-center justify-center hover:bg-brand-red-dark/10 rounded-2xl text-brand-dark-dark/90 dark:text-brand-white/70 hover:text-brand-red-light  transition-all duration-150">

            </a>
          </li>
          <li class="w-16 h-16 flex items-center justify-center hover:bg-brand-red-dark/10 rounded-2xl text-brand-dark-dark/90 dark:text-brand-white/70 hover:text-brand-red-light  transition-all duration-150">
            <a href="" class="w-full flex flex-col items-center justify-cetner">
              <i class="fas fa-cog text-2xl"></i>
              <span class="text-sm font-semibold">Settings</span>
            </a>
          </li>
          
        </ul>

        <div id="profile-btn" class="w-24 h-auto py-3 mb-3 flex flex-col gap-2 cursor-pointer items-center justify-center shadow-lg shadow-brand-red-dark/20 border border-brand-dark-dark/30 dark:border-brand-white/30 rounded-2xl bg-brand-dark-dark/10">
            <!-- <i class=" fas fa-user text-3xl text-brand-dark-dark dark:text-brand-white"></i> -->
            <img src="../assets/images/profiles/05.jfif" class="w-16 object-cover rounded-full border border-brand-dark-dark/30 dark:border-brand-white/30" alt="">

      <!-- NAVBAR -->

          <h1 class="text-2xl font-semibold text-brand-dark-dark dark:text-brand-white">Dashboard</h1>
          <span class="text-lg font-semibold text-brand-dark-dark dark:text-brand-white">Student <i class= "fa-solid fa-user-graduate text-xl text-brand-dark-dark dark:text-brand-white mx-3"></i></span>
        </div>
      </nav>


      <!-- CONTENT  -->
      <section id="content" class="w-[calc(100%-165px)] max-sm:w-full h-[calc(100%-120px)] px-10 fixed right-3 max-sm:right-0 top-24
        overflow-auto grid grid-cols-12 gap-5
        scroll-smooth scroll-container hidden">

        <div class="bg-white/70 max-lg:col-span-12 p-10 rounded-2xl h-96 mt-5 shadow-2xl col-span-7">

          <canvas id="circleChart"></canvas>
        </div>

      </section>

            <button class="w-full flex flex-row items-center justify-between active:bg-brand-red-dark/10 dark:active:bg-brand-white/10 px-5 py-3 hover:bg-brand-red-dark/10 dark:hover:bg-brand-white/10 transition-colors duration-150 rounded-2xl" type="button">

              Logout
            </button>

        <!-- personal information -->
         <div class="col-span-9 max-sm:col-span-12 max-lg:col-span-7 h-full flex flex-col gap-5 items-center justify-start py-10 px-5 rounded-3xl shadow-2xl shadow-brand-red-dark/20 bg-brand-white/70 dark:bg-brand-dark-dark/70">

            <div class="w-full flex flex-row items-center justify-start gap-5">

              <div class="flex flex-row items-center justify-center gap-2">
                <label class="text-brand-dark-light/70 dark:text-brand-yellow/70 font-semibold" for="female">Female</label>
                <input class="w-5 h-5" type="radio" name="female" id="">
              </div>
            </div>

            <!-- name -->
            <div class="w-full flex flex-row items-center justify-between gap-10 max-sm:flex-col">
              <div class="w-1/2 max-sm:w-full flex flex-col items-start justify-center h-auto gap-2">

                <div class="w-full flex flex-row items-center justify-start  px-5 h-12 font-semibold  bg-brand-dark-dark/5 dark:bg-brand-white/10 rounded-2xl">Laitf</div>

                <div class="w-full flex flex-row items-center justify-start  px-5 h-12 font-semibold  bg-brand-dark-dark/5 dark:bg-brand-white/10 rounded-2xl">Khradmand</div>
              </div>
            </div>

            <!-- email -->

              <div class="w-full flex flex-col items-start justify-center h-auto gap-2">

                <div class="w-full flex flex-row items-center justify-start  px-5 h-12 font-semibold  bg-brand-dark-dark/5 dark:bg-brand-white/10 rounded-2xl">latif.khradmand@gamil.com</div>
              </div>
            </div>

            <!-- adrress -->
            <div class="w-full flex flex-row items-center justify-between gap-10">
              <div class="w-full flex flex-col items-start justify-center h-auto gap-2">
                <label class="text-brand-dark-light/70 dark:text-brand-yellow/70" for="">Address</label>
                <div class="w-full flex flex-row items-center justify-start  px-5 h-12 font-semibold  bg-brand-dark-dark/5 dark:bg-brand-white/10 rounded-2xl">Dasht-e Barchi, Kabul</div>
              </div>
            </div>

            <!-- phone number and date of birth -->
             <div class="w-full flex flex-row items-center justify-between gap-10">

                <label class="text-brand-dark-light/70 dark:text-brand-yellow/70" for="">Phone Number</label>
                <div class="w-full flex flex-row items-center justify-start  px-5 h-12 font-semibold  bg-brand-dark-dark/5 dark:bg-brand-white/10 rounded-2xl">(+93)777777777</div>

                    <option value="Turkey">Turkey</option>
                    <option value="Kazakhstan">Kazakhstan</option>
                    <option value="Uzbekistan">Uzbekistan</option>
                    <option value="UAE">UAE (United Arab Emirates)</option>
                    <option value="Saudi Arabia">Saudi Arabia</option>
                    <option value="Qatar">Qatar</option>
                    <option value="Bahrain">Bahrain</option>
                    <option value="Kuwait">Kuwait</option>
                    <option value="Oman">Oman</option>
                    <option value="Iraq">Iraq</option>
                    <option value="Syria">Syria</option>
                    <option value="Lebanon">Lebanon</option>
                    <option value="Jordan">Jordan</option>
                    <option value="Palestine">Palestine</option>
                    <option value="Yemen">Yemen</option>
                    <option value="Iraq">Iraq</option>
                    <option value="Syria">Syria</option>
                    <option value="Lebanon">Lebanon</option>
                    <option value="Jordan">Jordan</option>
                    <option value="Palestine">Palestine</option>
                    <option value="Yemen">Yemen</option>
                    <option value="Iraq">Iraq</option>
                  </select>
                </div>
              </div>
              <div class="w-1/2 flex flex-col items-start justify-center h-auto gap-2">
                <label class="text-brand-dark-light/70 dark:text-brand-yellow/70" for="">Postal Code</label>
                <div class="w-full flex flex-row items-center justify-between  px-5 h-12 font-semibold  bg-brand-dark-dark/5 dark:bg-brand-white/10 rounded-2xl">
                  123456</div>

            </div>
         </div>

      </section>
    </main>

    <script src="../assets/scripts/main.js"></script>
